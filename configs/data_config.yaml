# Data ingestion and validation configuration
# All 53 expected raw columns. If any column is missing, the pipeline fails loudly.

data_path: "data/DataCoSupplyChainDataset.csv"
encoding: "latin-1"
target_column: "Late_delivery_risk"

# Minimum number of rows to accept. Protects against accidental empty-file runs.
min_rows: 10000

# Expected label distribution range. If positive rate drifts outside this window,
# something is wrong with the labeling source — not the model.
min_positive_rate: 0.40
max_positive_rate: 0.65

# Train / Val / Test split fractions. Must sum to 1.0.
train_frac: 0.80
val_frac: 0.10
test_frac: 0.10
random_state: 42

# All 53 raw columns that must be present in the source CSV.
expected_columns:
  - "Type"
  - "Days for shipping (real)"
  - "Days for shipment (scheduled)"
  - "Benefit per order"
  - "Sales per customer"
  - "Delivery Status"
  - "Late_delivery_risk"
  - "Category Id"
  - "Category Name"
  - "Customer City"
  - "Customer Country"
  - "Customer Email"
  - "Customer Fname"
  - "Customer Id"
  - "Customer Lname"
  - "Customer Password"
  - "Customer Segment"
  - "Customer State"
  - "Customer Street"
  - "Customer Zipcode"
  - "Department Id"
  - "Department Name"
  - "Latitude"
  - "Longitude"
  - "Market"
  - "Order City"
  - "Order Country"
  - "Order Customer Id"
  - "order date (DateOrders)"
  - "Order Id"
  - "Order Item Cardprod Id"
  - "Order Item Discount"
  - "Order Item Discount Rate"
  - "Order Item Id"
  - "Order Item Product Price"
  - "Order Item Profit Ratio"
  - "Order Item Quantity"
  - "Sales"
  - "Order Item Total"
  - "Order Profit Per Order"
  - "Order Region"
  - "Order State"
  - "Order Status"
  - "Order Zipcode"
  - "Product Card Id"
  - "Product Category Id"
  - "Product Description"
  - "Product Image"
  - "Product Name"
  - "Product Price"
  - "Product Status"
  - "shipping date (DateOrders)"
  - "Shipping Mode"

# Maximum allowed null rate per critical column.
# Columns not listed here have no null rate threshold.
null_thresholds:
  "Late_delivery_risk": 0.0       # Target must NEVER be null
  "Days for shipment (scheduled)": 0.01
  "Shipping Mode": 0.01
  "Order Region": 0.01
  "Market": 0.01
  "Customer Segment": 0.01
  "Latitude": 0.01
  "Longitude": 0.01

# Critical dtype family checks (lightweight and robust to pandas backend differences).
expected_dtypes:
  "Late_delivery_risk": "numeric"
  "Days for shipment (scheduled)": "numeric"
  "Order Item Quantity": "numeric"
  "Shipping Mode": "string"
  "Market": "string"
  "Customer Segment": "string"

# Domain sanity bounds. Prevent impossible values from flowing into training.
value_ranges:
  "Late_delivery_risk":
    min: 0
    max: 1
  "Days for shipment (scheduled)":
    min: 0
    max: 365
  "Order Item Quantity":
    min: 1
    max: 1000
  "Order Item Discount Rate":
    min: 0
    max: 1
  "Latitude":
    min: -90
    max: 90
  "Longitude":
    min: -180
    max: 180

# Guardrail vocab for key categoricals used downstream.
allowed_categories:
  "Shipping Mode":
    - "Standard Class"
    - "Second Class"
    - "First Class"
    - "Same Day"
  "Customer Segment":
    - "Consumer"
    - "Corporate"
    - "Home Office"
  "Market":
    - "LATAM"
    - "Europe"
    - "Pacific Asia"
    - "USCA"
    - "Africa"
